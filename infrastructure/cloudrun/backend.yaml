apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: aiengos-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle (cost optimization)
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Use Cloud SQL proxy for database connection
        run.googleapis.com/cloudsql-instances: "PROJECT_ID:REGION:aiengos-db"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: aiengos-backend@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/aiengos/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
            # Secrets loaded from Secret Manager
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiengos-database-url
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aiengos-redis-url
                  key: latest
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aiengos-secret-key
                  key: latest
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: aiengos-langfuse-public-key
                  key: latest
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aiengos-langfuse-secret-key
                  key: latest
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
