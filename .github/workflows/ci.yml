name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Governance: documentation and architecture checks ───────────────────────
  governance:
    name: Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check architecture and documentation standards
        run: python scripts/governance_check.py

  # ── Backend: lint, typecheck, test ──────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy app/
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Tests
        run: pytest --tb=short -q
        env:
          ENVIRONMENT: development
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/aiengos
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_CLOUD_PROJECT: ""
          PYTHONPATH: ${{ github.workspace }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aiengos
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

  # ── Frontend: lint, typecheck, build ────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ── Docker: build images ─────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        # Build context is repo root — Dockerfile references apps/backend/ and packages/
        run: docker build -f apps/backend/Dockerfile -t aiengos-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f apps/frontend/Dockerfile -t aiengos-frontend:${{ github.sha }} apps/frontend/
