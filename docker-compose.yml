services:

  # ── PostgreSQL with pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aiengos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aiengos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    user: root  # needed to read the gcloud ADC mount in development
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/aiengos
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      # Mount host ADC so the container can call Vertex AI without a service account key.
      # Run `gcloud auth application-default login` on your host first.
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot-reload in development: mount source over the image copy
      - ./apps/backend/app:/app/app
      - ./apps/backend/packages:/app/packages
      # Google Application Default Credentials (for Vertex AI)
      # GCLOUD_CONFIG_DIR is set in the root .env file
      - ${GCLOUD_CONFIG_DIR}:/root/.config/gcloud:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── Celery worker (Phase 4 — wired now, activated later) ────────────────────
  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    user: root  # needed to read the gcloud ADC mount in development
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/aiengos
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend/app:/app/app
      - ./apps/backend/packages:/app/packages
      - ${GCLOUD_CONFIG_DIR}:/root/.config/gcloud:ro
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
  redis_data:
